https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css

<body class="bg">

<nav class="navbar navbar-expand-lg text surface">
    <div class="container">

        <a class="navbar-brand fw-bold" href="#">
            Customer Plus
        </a>

        <!-- Mobile Controls -->
        <div class="d-flex d-lg-none align-items-center gap-2 ms-auto">
            <button class="btn border-0 icon-bg" id="theme">
                <i class="bi bi-sun-fill fs-4 d-none" id="light"></i>
                <i class="bi bi-moon-fill fs-4" id="dark"></i>
            </button>

            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>

        <div class="collapse navbar-collapse" id="navbarMenu">

            <ul class="navbar-nav mx-auto text-center">
                <li class="nav-item">
                    <a class="nav-link active" href="#">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">About</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">Contact</a>
                </li>
            </ul>

            <div class="d-flex flex-column flex-lg-row align-items-center gap-2 mt-3 mt-lg-0">

                <!-- Desktop Theme -->
                <button class="btn border-0 icon-bg d-none d-lg-block" id="theme2">
                    <i class="bi bi-sun-fill fs-4 d-none" id="light2"></i>
                    <i class="bi bi-moon-fill fs-4" id="dark2"></i>
                </button>

                <button class="btn btn-success text-light" id="login">
                    <span class="login-text">
                        Login
                    </span>
                    <span class="spinner-border spinner-border-sm d-none login-spinner"></span>
                </button>

                <button class="btn btn-primary text-light" id="register">
                    <span class="register-text">
                        Signup
                    </span>
                    <span class="spinner-border spinner-border-sm d-none register-spinner"></span>
                </button>
            </div>

        </div>

    </div>
</nav>
