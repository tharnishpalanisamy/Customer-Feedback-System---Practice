    <!--Table-->

<div class="container mt-5">
    <div class="row align-items-center gy-3">

        <!-- Left Side -->
        <div class="col-12 col-lg-4">
            <div class="d-flex align-items-center gap-3">
                <a href="user.html" class="btn btn-outline-danger">Back</a>

                <span class="btn btn-outline-primary rounded-pill px-4 py-2 fw-medium">
                    Your Feedbacks
                </span>
            </div>
        </div>

        <!-- Right Side -->
        <div class="col-12 col-lg-8">
            <div class="row g-3">

                <!-- Rating -->
                <div class="col-12 col-sm-6 col-lg-3">
                    <select id="ratingFilter" class="form-select">
                        <option value="All">All Ratings</option>
                        <option value="5">⭐⭐⭐⭐⭐</option>
                        <option value="4">⭐⭐⭐⭐ & Above</option>
                        <option value="3">⭐⭐⭐ & Above</option>
                        <option value="2">⭐⭐ & Above</option>
                        <option value="1">⭐ Only</option>
                    </select>
                </div>

                <!-- Department -->
                <div class="col-12 col-sm-6 col-lg-3">
                    <select id="departmentFilter" class="form-select">
                        <option value="All">All Departments</option>
                        <option value="Health Care">Health Care</option>
                        <option value="Infrastructure">Infrastructure</option>
                        <option value="Law and Order">Law and Order</option>
                        <option value="Administration">Administration</option>
                    </select>
                </div>

                <!-- Status -->
                <div class="col-12 col-sm-6 col-lg-3">
                    <select id="statusFilter" class="form-select">
                        <option value="All">All Status</option>
                        <option value="Responded">Responded</option>
                        <option value="Pending">Pending</option>
                    </select>
                </div>

                <!-- Search -->
                <div class="col-12 col-sm-6 col-lg-3">
                    <div class="input-group">
                        <input type="text" class="form-control" id="searchTitle" placeholder="Search by title">
                        <span class="input-group-text">
                            <i class="bi bi-search"></i>
                        </span>
                    </div>
                </div>

            </div>
        </div>

    </div>
</div>


    <div class="container table-responsive mt-5">
        <table class="table table-striped text table-bordered">
            <thead>
                <tr class="table-primary">
                    <th scope="col">S.no</th>
                    <th scope="col">Title</th>
                    <th scope="col">Rating</th>
                    <th scope="col">Department</th>
                    <th scope="col">Feedback</th>
                    <th scope="col">Status</th>
                    <th scope="col">Submitted Date</th>
                    <th scope="col">Responded Date</th>
                    <th scope="col">Response</th>
                    <th scope="col">Actions</th>
                </tr>
            </thead>
            <tbody class="table-hover">
                <tr>
            <td colspan="10" class="text-center py-5 text-secondary">
                <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                No feedback found.
            </td>
        </tr>
            </tbody>
        </table>
    </div>

    <!--Edit feeback Modal-->

    <div class="modal fade" id="editFeedbackModal" tabindex="-1" aria-labelledby="editFeedbackModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
        <div class="modal-header">
            <h1 class="modal-title fs-5" id="editFeedbackModalLabel">Modal title</h1>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
            <label for="title" class="form-label">Title <span class="required">*</span></label>
                <input type="text" class="form-control" id="editTitle" placeholder="Enter the title">
            
            <div class="mt-3">
                <label for="department" class="form-label">Department <span class="required">*</span></label>
                <select name="department" id="editDepartment" class="form-select">
                    <option value="">Select Department</option>
                    <option value="Health Care">Health Care</option>
                    <option value="Infrastructure">Infrastructure</option>
                    <option value="Law and Order">Law and Order</option>
                    <option value="Administration">Administration</option>
                </select>
            </div>
            <div class="mt-3">
                <label for="feedback" class="form-label">Feedback <span class="required">*</span></label>
                <textarea name="feedback" id="editFeedback" class="form-control" placeholder="Enter Your Feedback"></textarea>
            </div>
            <div class="mt-3">
                <label for="rating" class="form-label">Rating <span class="required">*</span></label>
                <div id="editRatingContainer" class="fs-2 text-warning">
                    <i class="bi bi-star edit-rating-star" data-value="1"></i>
                    <i class="bi bi-star edit-rating-star" data-value="2"></i>
                    <i class="bi bi-star edit-rating-star" data-value="3"></i>
                    <i class="bi bi-star edit-rating-star" data-value="4"></i>
                    <i class="bi bi-star edit-rating-star" data-value="5"></i>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            <button type="button" class="btn btn-primary" id="saveBtn">Save changes</button>
        </div>
        </div>
    </div>
    </div>
