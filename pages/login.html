<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../styles/login.css">
    <link rel="stylesheet" href="../styles/theme.css">
</head>
<body class="bg">

    <!--nav bar-->
    <nav class="navbar navbar-expand-lg text surface">
    <div class="container">

        <a class="navbar-brand fw-bold" href="#">
            Customer Plus
        </a>

        <!-- Mobile Controls -->
        <div class="d-flex align-items-center gap-2 ms-auto">
            <button class="btn border-0 icon-bg" id="theme">
                <i class="bi bi-sun-fill fs-4 d-none " id="light"></i>
                <i class="bi bi-moon-fill fs-4" id="dark"></i>
            </button>
    </div>
</nav>

    <div class="container mt-5 text">
        <div class="row">
            <div class="col-10 col-md-8 col-lg-4 surface mx-auto">
                <h3 class="text-center">Login</h3>
                <form action="" id="loginForm" class="p-2">
                    <div class="mt-3 text-center">
                        <label for="user">User</label>
                        <input type="radio" value="user" name="role" checked>
                        <label for="admin" class="ps-2">Admin</label>
                        <input type="radio" value="admin" name="role">
                    </div>
                    <div class="mt-3">
                        <label for="email" class="form-label ">Email <span class="required">*</span></label>
                        <input type="email" class="form-control" id="email" placeholder="Email"> 
                        <span class="emailErr required"></span>
                    </div>
                    
                    <div class="mt-3">
                        <label for="password" class="form-label">Password <span class="required">*</span></label>
                        <input type="password" class="form-control" id="password" placeholder="Password" >
                        <span class="passwordErr required"></span>
                    </div>
                    <div class="mt-4">
                        <button type="button" class="btn btn-primary w-100" id="loginBtn">Login</button>
                        
                    </div>

                    <div class="mt-2">
                        <p>Don't have an Account? <a href="register.html" class="text-decoration-none ">Register</a></p>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <script src="../js/login.js"></script>
    <script src="../js/theme.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
