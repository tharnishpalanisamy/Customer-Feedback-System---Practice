                        </div>
                    </div>

                    <!-- Right Side -->
                    <div class="col-12 col-lg-8">
                        <div class="row g-3 ">

                            <!-- Department -->
                            <div class="col-12 col-sm-6 col-lg-4">
                                <select id="roleFilter" class="form-select">
                                    <option value="All">All Role</option>
                                    <option value="User">User</option>
                                    <option value="Admin">Admin</option>
                                </select>
                            </div>

                            <!-- Status -->
                            <div class="col-12 col-sm-6 col-lg-4">
                                <select id="statusFilter" class="form-select">
                                    <option value="All">All Status</option>
                                    <option value="Active">Active</option>

                                </select>
                            </div>

                            <!-- Search -->

    <!--Edit user Modal--> 

    <!-- Modal -->
    <div class="modal fade" id="editUserModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="editUserModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
        <div class="modal-header">
            <h1 class="modal-title fs-5" id="editUserModalLabel">Modal title</h1>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
            <label for="name" class="form-label">Name <span class="required">*</span></label>
            <input type="text" class="form-control" id="name" placeholder="Enter Your Name"> 

            <div class="mt-3">
                <label for="email" class="form-label">Email <span class="required">*</span></label>
                <input type="email" class="form-control" id="email" placeholder="Enter Your Email"> 
            </div>

            <div class="mt-3">
                <label for="role" class="form-label">Role <span class="required">*</span></label>
                <select name="role" id="role" class="form-select">
                    <option value="User">User</option>
                    <option value="Admin">Admin</option>
                </select>
            </div>




        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            <button type="button" class="btn btn-primary" id="saveBtn">Save Changes</button>
        </div>
        </div>
