<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../styles/login.css">
    <link rel="stylesheet" href="../styles/theme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
</head>
<body class="bg">

    <!--nav bar-->
    <nav class="navbar navbar-expand-lg text surface">
    <div class="container">

        <a class="navbar-brand fw-bold" href="#">
            Customer Plus
        </a>

        <!-- Mobile Controls -->
        <div class="d-flex align-items-center gap-2 ms-auto">
            <button class="btn border-0 icon-bg" id="theme">
                <i class="bi bi-sun-fill fs-4 d-none " id="light"></i>
                <i class="bi bi-moon-fill fs-4" id="dark"></i>
            </button>
    </div>
</nav>

    <div class="container mt-5 text">
        <div class="row">
            <div class="col-10 col-md-8 col-lg-4 surface mx-auto box">
                <h3 class="text-center">Register</h3>
                <form action="" class="registerForm needs-validation" novalidate>

                    <!-- Name -->
                    <div class="mt-3">
                        <label for="name" class="form-label">Name <span class="required">*</span></label>
                        <div class="input-group has-validation">
                            <span class="input-group-text">
                                <i class="bi bi-person"></i>
                            </span>
                            <input type="text" class="form-control" id="name" placeholder="Enter Your Name" required>
                            <div class="invalid-feedback">Please enter your name.</div>
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="mt-3">
                        <label for="email" class="form-label">Email <span class="required">*</span></label>
                        <div class="input-group has-validation">
                            <span class="input-group-text">
                                <i class="bi bi-envelope"></i>
                            </span>
                            <input type="email" class="form-control" id="email" placeholder="Enter Your Email" required>
                            <div class="invalid-feedback">Please enter a valid email.</div>
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="mt-3">
                        <label for="password" class="form-label">Password <span class="required">*</span></label>
                        <div class="input-group has-validation">
                            <span class="input-group-text">
                                <i class="bi bi-lock"></i>
                            </span>
                            <input type="password" class="form-control" id="password" placeholder="Enter Your Password" required>
                            <div class="invalid-feedback">Password must contain at least 8 characters, one uppercase letter, one number and one special character.</div>
                        </div>
                    </div>

                    <!-- Confirm Password -->
                    <div class="mt-3">
                        <label for="confirm-password" class="form-label">Confirm Password <span class="required">*</span></label>
                        <div class="input-group has-validation">
                            <span class="input-group-text">
                                <i class="bi bi-shield-check"></i>
                            </span>
                            <input type="password" class="form-control" id="confirm-password" placeholder="Confirm Your Password" required>
                            <div class="invalid-feedback">Passwords do not match.</div>
                        </div>
                    </div>

                    <div class="mt-4">
                        <button type="button" class="btn btn-success w-100" id="registerBtn">
                            Create Account
                        </button>
                    </div>

                    <div class="mt-2">
                        <p>Already have an Account? <a href="login.html" class="text-decoration-none">Login</a></p>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <script type="module" src="../script/register.js"></script>
    <script src="../script/theme.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
