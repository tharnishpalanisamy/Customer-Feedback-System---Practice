<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../styles/login.css">
    <link rel="stylesheet" href="../styles/theme.css">
</head>
<body class="bg">

    <!--nav bar-->
    <nav class="navbar navbar-expand-lg text surface">
    <div class="container">

        <a class="navbar-brand fw-bold" href="#">
            Customer Plus
        </a>

        <!-- Mobile Controls -->
        <div class="d-flex align-items-center gap-2 ms-auto">
            <button class="btn border-0 icon-bg" id="theme">
                <i class="bi bi-sun-fill fs-4 d-none " id="light"></i>
                <i class="bi bi-moon-fill fs-4" id="dark"></i>
            </button>
    </div>
</nav>

<div class="container">
    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#feedbackModal"  >Share Feedback</button>
</div>



<!-- Feedback Modal--> 
<div class="modal fade" id="feedbackModal" tabindex="-1" aria-labelledby="feedbackModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="feedbackModalLabel">Feedback</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
            <label for="title" class="form-label">Title <span class="required">*</span></label>
            <input type="text" class="form-control" id="title" placeholder="Enter the title">
        <div class="mt-3">
            <label for="feedback" class="form-label">Feedback <span class="required">*</span></label>
            <textarea name="feedback" id="feedback" class="form-control" placeholder="Enter Your Feedback"></textarea>
        </div>
        <div class="mt-3">
            <label for="rating" class="form-label">Rating</label>
            <select name="rating" id="rating" class="form-select">
                <option value="">Select Rating</option>
                <option value="5">⭐⭐⭐⭐⭐</option>
                <option value="4">⭐⭐⭐⭐</option>
                <option value="3">⭐⭐⭐</option>
                <option value="2">⭐⭐</option>
                <option value="1">⭐</option>
            </select>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="button" class="btn btn-primary" id="saveFeedbackBtn">Save Feedback</button>
      </div>
    </div>
  </div>
</div>

    <script type="module" src="../script/user.js"></script>
    <script src="../script/theme.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
