<!-- Feedback Modal--> 
<div class="modal fade" id="feedbackModal" tabindex="-1" aria-labelledby="feedbackModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="feedbackModalLabel">Feedback</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
            <label for="title" class="form-label">Title <span class="required">*</span></label>
            <input type="text" class="form-control" id="title" placeholder="Enter the title">
        
        <div class="mt-3">
            <label for="department" class="form-label">Department <span class="required">*</span></label>
            <select name="department" id="department" class="form-select">
                <option value="">Select Department</option>
                <option value="Health Care">Health Care</option>
                <option value="Infrastructure">Infrastructure</option>
                <option value="Law and Order">Law and Order</option>
                <option value="Administration">Administration</option>
            </select>
        </div>
        <div class="mt-3">
            <label for="feedback" class="form-label">Feedback <span class="required">*</span></label>
            <textarea name="feedback" id="feedback" class="form-control" placeholder="Enter Your Feedback"></textarea>
        </div>
        <div class="mt-3">
            <label for="rating" class="form-label">Rating <span class="required">*</span></label>
            <div id="ratingContainer">
                <i class="bi bi-star rating-star fs-1 text-warning" data-value="1"></i>
                <i class="bi bi-star rating-star fs-1 text-warning" data-value="2"></i>
                <i class="bi bi-star rating-star fs-1 text-warning" data-value="3"></i>
                <i class="bi bi-star rating-star fs-1 text-warning" data-value="4"></i>
                <i class="bi bi-star rating-star fs-1 text-warning" data-value="5"></i>
            </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="button" class="btn btn-primary" id="saveFeedbackBtn">Save Feedback</button>
      </div>
    </div>
  </div>
</div>


<div class="container py-4 py-md-5 ">
    <div class="p-3 p-md-4 p-lg-5 rounded-4 surface hero">
        <h1 class="display-6 display-md-5 fw-bold active" id="name">
            Welcome User,
        </h1>

        <p class="text mt-3">
            We value your opinion. Share feedback, track responses, and help us deliver better services.
        </p>

        <button type="button" class="btn btn-primary mt-2" data-bs-toggle="modal" data-bs-target="#feedbackModal">
            Share Feedback
        </button>
    </div>
</div>


<!--Cards--> 

<div class="container mt-4">
    <div class="row g-4 justify-content-center">
        <div class="col-12 col-md-6 col-lg-3">
            <div class="card p-2">
                <div class="card-body">
                    <div class="d-flex justify-content-between p-3">
                    <h1 class="feedbackCount active display-5 fw-medium">0</h1>
                    <i class="bi bi-chat-left-text fs-1 active"></i>
                    </div>
                    <h3 class="card-title mt-2 text text-center">Total Feedback</h3>
                </div>
                <div class="card-footer">
                    <a id="totalView" href="userfeedback.html" class="text-decoration-none text d-flex justify-content-between">
                        <span>View More</span>
                        <span><i class="bi bi-arrow-right"></i></span>
                    </a>
                </div>
            </div>
        </div>


        <div class="col-12 col-md-6 col-lg-3 ">
            <div class="card p-2">
                <div class="card-body">
                    <div class="d-flex justify-content-between p-3">
                    <h1 class="responseCount active display-5 fw-medium">0</h1>
                    <i class="bi bi-reply fs-1 active"></i>
                    </div>
                    <h3 class="card-title mt-2 text text-center">Total Responded</h3>
                </div>
                <div class="card-footer">
                    <a id="responseView" class="text-decoration-none text d-flex justify-content-between">
                        <span>View More</span>
                        <span><i class="bi bi-arrow-right"></i></span>
                    </a>
                </div>
            </div>
        </div>



        <div class="col-12 col-md-6 col-lg-3">
            <div class="card p-2 gradient-card">
                <div class="card-body">
                    <div class="d-flex justify-content-between p-3">
                    <h1 class="averageRating active display-5 fw-medium">0</h1>
                    <i class="bi bi-star-fill fs-1 active"></i>
                    </div>
                    <h3 class="card-title mt-2 text text-center">Average Rating</h3>
                </div>
                <div class="card-footer">
                    <a id="ratingView" class="text-decoration-none text d-flex justify-content-between">
                        <span>View More</span>
                        <span><i class="bi bi-arrow-right"></i></span>
                    </a>
                </div>
            </div>
        </div>



        <div class="col-12 col-md-6 col-lg-3">
            <div class="card p-2 ">
                <div class="card-body">
                    <div class="d-flex justify-content-between p-3">
                    <h1 class="responseRate active display-5 fw-medium">0</h1>
                    <i class="bi bi-speedometer fs-1 active"></i>
                    </div>
                    <h3 class="card-title mt-2 text text-center">Response Rate</h3>
                </div>
                <div class="card-footer">
                    <a id="responseRateView" class="text-decoration-none text d-flex justify-content-between">
                        <span>View More</span>
                        <span><i class="bi bi-arrow-right"></i></span>
                    </a>
                </div>
            </div>
        </div>


        
    </div>
</div>
